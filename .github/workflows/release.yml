name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -o amp-proxy .
          zip amp-proxy-macos-arm64.zip amp-proxy

      - name: Build app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh
          ditto -c -k --keepParent "AMP Proxy.app" "amp-proxy-macos-arm64.app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            amp-proxy-macos-arm64.zip
            amp-proxy-macos-arm64.app.zip

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            amp-proxy-macos-arm64.zip
            amp-proxy-macos-arm64.app.zip
          generate_release_notes: true
          make_latest: true
